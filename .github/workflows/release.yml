name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test
        run: go test ./...
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          suffix=""
          if [ "${GOOS}" = "windows" ]; then suffix=".exe"; fi
          name="appstore-scraper_${GOOS}_${GOARCH}${suffix}"
          go build -trimpath -ldflags="-s -w" -o "${name}" .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: appstore-scraper_*

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
      - name: Compute source archive checksum
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        id: checksum
        run: |
          curl -fsSL -o source.tar.gz "https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          echo "sha256=$(sha256sum source.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - name: Checkout Homebrew tap
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: youngminz/homebrew-tap
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        run: |
          mkdir -p homebrew-tap/Formula
          ./scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" "${{ steps.checksum.outputs.sha256 }}" "homebrew-tap/Formula/appstore-scraper.rb"
      - name: Commit formula
        if: ${{ env.HOMEBREW_TAP_TOKEN != '' }}
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/appstore-scraper.rb
          git commit -m "appstore-scraper ${GITHUB_REF_NAME}" || exit 0
          git push
      - name: Skip Homebrew tap update
        if: ${{ env.HOMEBREW_TAP_TOKEN == '' }}
        run: echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap update."
