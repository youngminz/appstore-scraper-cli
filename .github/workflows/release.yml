name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          suffix=""
          if [ "${GOOS}" = "windows" ]; then suffix=".exe"; fi
          name="appstore-scraper_${GOOS}_${GOARCH}${suffix}"
          go build -trimpath -ldflags="-s -w" -o "${name}" .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: appstore-scraper_*
